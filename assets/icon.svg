<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020810"/>
      <stop offset="100%" style="stop-color:#040d1a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="128" cy="128" r="96" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.3"/>
  <circle cx="128" cy="128" r="82" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <!-- Middle ring -->
  <circle cx="128" cy="128" r="55" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="0.7"/>
  <circle cx="128" cy="128" r="44" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3" stroke-dasharray="10 5"/>
  <!-- Center core -->
  <circle cx="128" cy="128" r="14" fill="none" stroke="url(#ring)" stroke-width="3"/>
  <circle cx="128" cy="128" r="5" fill="#60a5fa">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Orbiting dots -->
  <circle cx="128" cy="38" r="4" fill="#f59e0b" opacity="0.8"/>
  <circle cx="128" cy="218" r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="38" cy="128" r="3" fill="#34d399" opacity="0.6"/>
  <circle cx="218" cy="128" r="4" fill="#8b5cf6" opacity="0.7"/>
  <!-- Data nodes -->
  <rect x="72" y="170" width="8" height="24" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="84" y="178" width="6" height="16" rx="2" fill="#8b5cf6" opacity="0.5"/>
  <rect x="94" y="172" width="7" height="22" rx="2" fill="#f59e0b" opacity="0.6"/>
  <rect x="105" y="182" width="5" height="12" rx="2" fill="#34d399" opacity="0.5"/>
</svg>
